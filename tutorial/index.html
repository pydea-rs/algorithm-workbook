<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odoo Coderbyte — Interactive Masterclass</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
</head>
<body>

  <!-- ============== SIDEBAR ============== -->
  <aside id="sidebar">
    <div class="brand">
      <div class="brand-mark">Co</div>
      <div class="brand-text">
        <div class="brand-title">Coderbyte Prep</div>
        <div class="brand-sub">Odoo Assessment</div>
      </div>
    </div>

    <nav id="nav-list">
      <!-- Populated by app.js -->
    </nav>

    <div class="progress-card">
      <div class="progress-label">Your Progress</div>
      <div class="progress-bar"><div id="progress-fill"></div></div>
      <div class="progress-stats">
        <span id="progress-text">0 / 0</span>
        <button id="reset-progress" title="Reset all progress">Reset</button>
      </div>
    </div>
  </aside>

  <!-- ============== MAIN ============== -->
  <main id="main">
    <header id="topbar">
      <button id="menu-toggle" aria-label="Toggle menu">&#9776;</button>
      <div id="crumbs"></div>
      <div class="topbar-actions">
        <span id="pyodide-status" class="status-pill status-idle">Python: not loaded</span>
      </div>
    </header>

    <section id="view-container">
      <!-- Active view rendered here -->
    </section>

    <footer id="footer">
      <span>Built for self-paced prep &middot; Python 3 via Pyodide &middot; No data leaves your browser.</span>
    </footer>
  </main>

  <!-- ============== ANSWER MODAL ============== -->
  <div id="answer-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-panel">
      <div class="modal-header">
        <h3 id="modal-title">Answer</h3>
        <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="modal-warning">
        <strong>Make sure you've tried it first.</strong>
        Looking at the answer before attempting will hurt your learning.
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- ============== TOAST ============== -->
  <div id="toast" class="toast hidden"></div>

  <!-- Pyodide loaded lazily by runner.js -->
  <script src="questions.js"></script>
  <script src="content.js"></script>
  <script src="runner.js"></script>
  <script src="app.js"></script>
</body>
</html>
